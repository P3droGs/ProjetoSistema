<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes | Sistema de Agendamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<style>

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);

  display: flex;
  align-items: center;
  justify-content: center;

  backdrop-filter: blur(4px);
  z-index: 100;
}

.hidden {
  display: none;
}

/* CAIXA DO MODAL */

.modal-box {

  background: #ffffff;

  padding: 28px;

  border-radius: 14px;

  width: 100%;
  max-width: 380px;

  box-shadow: 0 20px 40px rgba(0,0,0,0.18);

  font-family: system-ui, -apple-system, BlinkMacSystemFont;

  animation: modalEnter .2s ease;

}

.modal-box h2 {

  margin: 0 0 18px;

  font-size: 20px;

  font-weight: 600;

  color: #111827;

}

/* INPUTS */

.form-group {

  display: flex;
  flex-direction: column;

  margin-bottom: 14px;

}

.form-group label {

  font-size: 13px;

  margin-bottom: 4px;

  color: #6b7280;

}

.form-group input {

  padding: 10px;

  border-radius: 8px;

  border: 1px solid #d1d5db;

  font-size: 14px;

  transition: all .15s ease;

}

.form-group input:focus {

  outline: none;

  border: 1px solid #4f46e5;

  box-shadow: 0 0 0 2px rgba(79,70,229,0.15);

}

/* BOTÕES */

.modal-actions {

  margin-top: 20px;

  display: flex;

  justify-content: flex-end;

  gap: 10px;

}

.btn-cancelar {

  background: #e5e7eb;

  border: none;

  padding: 9px 14px;

  border-radius: 8px;

  cursor: pointer;

  font-weight: 500;

  transition: background .15s;

}

.btn-cancelar:hover {

  background: #d1d5db;

}

.btn-confirmar {

  background: #4f46e5;

  color: white;

  border: none;

  padding: 9px 16px;

  border-radius: 8px;

  cursor: pointer;

  font-weight: 500;

  transition: background .15s;

}

.btn-confirmar:hover {

  background: #4338ca;

}

/* ANIMAÇÃO */

@keyframes modalEnter {

  from {
    transform: translateY(-10px);
    opacity: 0;
  }

  to {
    transform: translateY(0);
    opacity: 1;
  }

}

</style>
<!-- MODAL ADICIONAR CLIENTE -->
<div id="modal-adicionar-cliente" class="modal hidden">

<div class="modal-content">

<h3>Novo Cliente</h3>

<input id="input-nome-cliente" type="text" placeholder="Nome">

<input id="input-telefone-cliente" type="text" placeholder="Telefone">

<input id="input-email-cliente" type="email" placeholder="Email">

<div class="modal-actions">

<button id="btn-cancelar-add-cliente">
Cancelar
</button>

<button id="btn-confirmar-add-cliente">
Cadastrar
</button>

</div>
</div>
</div>


<!-- MODAL ATUALIZAR CLIENTE -->

<div id="modal-atualizar-cliente" class="modal hidden">

  <div class="modal-box">

    <h2>Atualizar Cliente</h2>

    <div class="form-group">
      <label>Nome</label>
      <input id="input-nome-atualizar-cliente" type="text">
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input id="input-telefone-atualizar-cliente" type="text">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="input-email-atualizar-cliente" type="email">
    </div>

    <div class="modal-actions">

      <button id="btn-cancelar-atualizar-cliente" class="btn-cancelar">
        Cancelar
      </button>

      <button id="btn-confirmar-atualizar-cliente" class="btn-confirmar">
        Atualizar
      </button>

    </div>

  </div>

</div>


<!-- MODAL EXCLUIR CLIENTE -->

<div id="modal-excluir-cliente" class="modal hidden">

<div class="modal-content">

<h3>Excluir cliente</h3>

<p>Tem certeza que deseja remover este cliente?</p>

<div class="modal-actions">

<button id="btn-cancelar-cliente">
Cancelar
</button>

<button id="btn-confirmar-cliente" style="background:#dc2626;color:#fff;">
Remover
</button>

</div>
</div>
</div>


<div class="layout">

<aside class="sidebar">

<h1>Agendamento</h1>

<a href="index.html">Dashboard</a>

<a href="agendamentos.html">Agendamentos Hoje</a>

<a href="clientes.html" class="active">Clientes</a>

<a href="barbeiros.html">Barbeiros</a>

</aside>


<main class="content">

<div class="header-page">

<h2>Clientes</h2>

<button id="btn-add-cliente">
Novo Cliente
</button>

</div>


<table>

<thead>

<tr>

<th>Nome</th>

<th>Telefone</th>

<th>Email</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="clientes-tbody"></tbody>

</table>

</main>

</div>

<script type="module" src="./dist/app.js"></script>

</body>
</html>
